name: Steem Load Balancer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run complete checks
        run: npm run check

  compatibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run compatibility tests
        run: npm test

  # Full integration suite (requires Docker + docker-compose).
  integration:
    runs-on: ubuntu-latest
    needs: [quality, compatibility]

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up environment
        run: |
          source ./setup-env.sh
          echo "STEEM_LB_PATH=$STEEM_LB_PATH" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV
          echo "NODE_ENV=$NODE_ENV" >> $GITHUB_ENV
          echo "RETRY_COUNT=$RETRY_COUNT" >> $GITHUB_ENV
          echo "SSL_CERT_PATH=$SSL_CERT_PATH" >> $GITHUB_ENV
          echo "SSL_KEY_PATH=$SSL_KEY_PATH" >> $GITHUB_ENV
          echo "STEEM_LB_PORT=$STEEM_LB_PORT" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests.sh

      - name: Run integration tests (Empty Nodes in config.yaml)
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests-empty-nodes.sh

      - name: Run integration tests (No Valid Nodes in config.yaml)
        run: |
          cd ./tests/
          echo "No valid node found"
          ./run-tests.sh ./integration-tests-error-nodes.sh

      - name: Run integration tests (Docker Compose)
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests-docker-compose.sh

  docker:
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dockerhub

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: justyy/steem-load-balancer:latest
