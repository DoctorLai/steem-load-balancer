name: Steem Load Balancer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast feedback: lint, format check and unit tests across supported Node versions.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: NODE_ENV=production npm run lint

      - name: Run Prettier
        run: npm run format

      - name: Run unit tests
        run: NODE_ENV=production npm test

  # Full integration suite (requires Docker + docker-compose).
  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up environment
        run: |
          source ./setup-env.sh
          echo "STEEM_LB_PATH=$STEEM_LB_PATH" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV
          echo "NODE_ENV=$NODE_ENV" >> $GITHUB_ENV
          echo "RETRY_COUNT=$RETRY_COUNT" >> $GITHUB_ENV
          echo "SSL_CERT_PATH=$SSL_CERT_PATH" >> $GITHUB_ENV
          echo "SSL_KEY_PATH=$SSL_KEY_PATH" >> $GITHUB_ENV
          echo "STEEM_LB_PORT=$STEEM_LB_PORT" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests.sh

      - name: Run integration tests (Empty Nodes in config.yaml)
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests-empty-nodes.sh

      - name: Run integration tests (No Valid Nodes in config.yaml)
        run: |
          cd ./tests/
          echo "No valid node found"
          ./run-tests.sh ./integration-tests-error-nodes.sh

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Run integration tests (Docker Compose)
        run: |
          cd ./tests/
          ./run-tests.sh ./integration-tests-docker-compose.sh

  docker:
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dockerhub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: justyy/steem-load-balancer:latest
